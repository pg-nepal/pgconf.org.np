{% extends "base.html" %}
{% block main %}
<div class="main_background">
    <div class="hero">
        <div class="hero-text">
            <div class="hero-text-header">
                <h3>{% block page_title%}{% endblock %}</h3>
            </div>
            <div class="hero-text-par">
                <div class="grid-container">
                    <div class="grid-item left-part" style="min-height:500px;">
                        <div class="grid-text">
                            {% block main_content %}{% endblock %}
                        </div>
                    </div>
                    <div class="grid-item right-menu">
                        {% include 'right_menubar.html' %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
